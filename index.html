<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EntryVine Events</title>
  <meta name="description"
    content="Tickets and tables for premium events, sold under your own brand. Attendees pick their exact table; organizers keep every dollar." />
  <meta name="theme-color" content="#8a2d3b" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta property="og:site_name" content="EntryVine Events" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="EntryVine Events" />
  <meta property="og:description" content="Tickets and tables for premium events, sold under your own brand." />
  <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "name": "EntryVine",
            "url": "https://entryvine.com",
            "description": "Multi-tenant box office platform for premium events: branded ticketing, table selection, card and ACH payments."
          },
          {
            "@type": "WebSite",
            "name": "EntryVine Events",
            "url": "https://entryvine.com"
          }
        ]
      }
    </script>
</head>

<body>
  <div id="hero-flash"
    style="position:absolute;top:0;left:0;right:0;height:96vh;z-index:1;overflow:hidden;pointer-events:none;background:#1c1917">
    <img src="/hero.webp" alt="" fetchpriority="high" style="width:100%;height:100%;object-fit:cover;opacity:.7" />
    <div
      style="position:absolute;inset:0;background:linear-gradient(to right,rgba(28,25,23,.85),rgba(28,25,23,.4) 50%,transparent),linear-gradient(to bottom,rgba(28,25,23,.7),rgba(28,25,23,.6) 50%,#1c1917)">
    </div>
  </div>
  <script>
    (function () {
      var sub = window.location.hostname.split('.')[0];
      var portalSub = sub === 'admin' || sub === 'staff' || sub === 'developer';
      var storedPortal = window.localStorage.getItem('entryvine-portal');
      if (portalSub || (storedPortal && storedPortal !== 'public')) {
        document.getElementById('hero-flash').remove();
      }
    })();
  </script>
  <div id="root"></div>
  <noscript>EntryVine Events requires JavaScript to browse and book events.</noscript>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
